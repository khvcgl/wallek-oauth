<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>WalleK'e Bağlan</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
  *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
  body{margin:0;background:#faf6ef;color:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .card{background:#fff;border-radius:18px;box-shadow:0 8px 30px rgba(0,0,0,.08);max-width:390px;width:100%;padding:30px}
  .lock{font-size:32px;text-align:center;margin-bottom:6px}
  h1{font-size:21px;margin:0 0 6px;color:#006e28;text-align:center}
  .sub{font-size:14px;color:#555;margin:0 0 20px;line-height:1.55;text-align:center}
  .app{font-weight:600;color:#1a1a1a}
  label{display:block;font-size:13px;color:#444;margin:14px 0 6px;font-weight:600}
  input[type=email],input[type=password]{width:100%;padding:13px 14px;border:1px solid #e0ddd5;border-radius:11px;font-size:16px;background:#faf6ef;outline:none;-webkit-appearance:none}
  input:focus{border-color:#006e28}
  button{width:100%;margin-top:24px;padding:15px;background:#006e28;color:#fff;border:0;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
  button:active{opacity:.85}
  .err{background:#fde8e8;color:#b91c1c;padding:11px 13px;border-radius:10px;font-size:13.5px;margin-bottom:16px;line-height:1.4}
  .foot{font-size:11.5px;color:#999;margin-top:20px;text-align:center;line-height:1.55}
  .bad{background:#fde8e8;color:#b91c1c;padding:14px;border-radius:12px;font-size:14px;text-align:center;line-height:1.5}
</style>
</head>
<body>
<form class="card" id="f" method="POST">
  <div class="lock">🔒</div>
  <h1>WalleK'e Bağlan</h1>
  <p class="sub" id="sub"><span class="app" id="appname">Bir AI uygulaması</span> WalleK finansal verine erişmek ve senin adına kayıt önermek istiyor. İzin vermek için WalleK hesabınla giriş yap.</p>
  <div class="err" id="err" style="display:none"></div>
  <div id="fields">
    <label for="email">E-posta</label>
    <input id="email" type="email" name="email" required autocomplete="username" inputmode="email" autocapitalize="none" autocorrect="off" spellcheck="false">
    <label for="pw">Şifre</label>
    <input id="pw" type="password" name="password" required autocomplete="current-password">
    <div class="cf-turnstile" data-sitekey="0x4AAAAAADhb0vCnx4ZOrfDL" data-language="tr" style="margin-top:18px;display:flex;justify-content:center"></div>
    <button type="submit">Giriş yap ve izin ver</button>
  </div>
  <p class="foot">Şifren doğrudan WalleK'e gönderilir, AI uygulamasına <b>gönderilmez</b>. Bağlantıyı istediğin an WalleK → Ayarlar → AI Connector'dan kaldırabilirsin.</p>
</form>
<script>
(function(){
  var q = new URLSearchParams(location.search);
  var ENDPOINT = 'https://mmkbcwnsyygwovcpeecq.supabase.co/functions/v1/wallek-mcp/authorize';
  var keys = ['response_type','client_id','redirect_uri','code_challenge','code_challenge_method','state','resource','scope'];
  var f = document.getElementById('f');
  f.action = ENDPOINT;
  if(!q.get('client_id') || !q.get('redirect_uri') || !q.get('code_challenge')){
    document.querySelector('.card').innerHTML = '<div class="lock">⚠️</div><div class="bad">Bağlantı parametreleri eksik. Lütfen AI uygulamasından (Claude / ChatGPT) tekrar “Bağlan” deyin.</div>';
    return;
  }
  keys.forEach(function(k){
    var v = q.get(k); if(v===null) return;
    var i = document.createElement('input');
    i.type='hidden'; i.name=k; i.value=v;
    f.insertBefore(i, f.firstChild);
  });
  if(q.get('err')){
    var e = document.getElementById('err');
    var m = {cred:'E-posta veya şifre hatalı. Tekrar deneyin.', pkce:'Güvenlik doğrulaması eksik, AI uygulamasından tekrar bağlanın.', code:'Kod üretilemedi, lütfen tekrar deneyin.'};
    e.textContent = m[q.get('err')] || 'Giriş başarısız, lütfen tekrar deneyin.';
    e.style.display='block';
  }
})();
</script>
</body>
</html>
