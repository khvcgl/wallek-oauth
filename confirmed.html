<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>WalleK — Kayıt Tamamlandı</title>
<style>
  *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
  body{margin:0;background:#faf6ef;color:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .card{background:#fff;border-radius:18px;box-shadow:0 8px 30px rgba(0,0,0,.08);max-width:390px;width:100%;padding:38px 30px;text-align:center}
  .check{width:72px;height:72px;border-radius:50%;background:#e6f4ea;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:42px;font-weight:700;color:#006e28;line-height:1}
  h1{font-size:22px;margin:0 0 8px;color:#006e28}
  .sub{font-size:15px;color:#555;margin:0 0 26px;line-height:1.6}
  .logo{width:84px;height:84px;border-radius:20px;box-shadow:0 4px 14px rgba(0,0,0,.12);margin:0 auto 8px;display:block}
  .brand{font-size:15px;font-weight:700;color:#1a1a1a;margin:0 0 24px;letter-spacing:.3px}
  .btn{display:block;width:100%;padding:15px;background:#006e28;color:#fff;border:0;border-radius:12px;font-size:16px;font-weight:600;text-decoration:none}
  .hint{font-size:12.5px;color:#999;margin-top:16px;line-height:1.5}
</style>
</head>
<body>
  <div class="card">
    <div class="check">&#10003;</div>
    <h1>Kayıt başarıyla tamamlandı!</h1>
    <p class="sub">WalleK hesabın doğrulandı. Artık giriş yapıp kullanmaya başlayabilirsin.</p>
    <img class="logo" src="wallek-icon.png" alt="WalleK">
    <p class="brand">WalleK</p>
    <a class="btn" href="walletak://">Uygulamayı Aç</a>
    <p class="hint">Buton açmazsa telefonundaki WalleK uygulamasını elle aç ve giriş yap.</p>
  </div>
  <script>
    // E-posta linkinden gelince uygulamayı otomatik açmayı dene
    setTimeout(function(){ try { window.location.href = 'walletak://'; } catch (e) {} }, 600);
  </script>
</body>
</html>
